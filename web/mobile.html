<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>LAN Drop</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--fg:#17212b;--muted:#667085;--bd:#d8dee8;--pri:#2563eb;--ok:#169c61;--warn:#c77b08;--err:#d64545}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#162033;--fg:#e5edf7;--muted:#94a3b8;--bd:#263244}}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--fg)}nav{display:flex;gap:.6rem;align-items:center;padding:.9rem 1rem;border-bottom:1px solid var(--bd);background:var(--card);position:sticky;top:0}button,input,textarea,select{font:inherit}button{cursor:pointer}textarea,input,select{width:100%;padding:.75rem;border:1px solid var(--bd);border-radius:12px;background:var(--bg);color:var(--fg)}.wrap{max-width:760px;margin:0 auto;padding:.85rem}.grid{display:grid;grid-template-columns:1fr;gap:.85rem}.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:.9rem}.row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}.sp{flex:1}.btn{border:1px solid var(--bd);background:transparent;color:var(--fg);padding:.6rem .9rem;border-radius:999px}.pri{background:var(--pri);border-color:var(--pri);color:#fff}.err{background:var(--err);border-color:var(--err);color:#fff}.muted{color:var(--muted)}.hint{font-size:.84rem;color:var(--muted)}.drop{border:2px dashed var(--bd);padding:1rem;border-radius:14px;text-align:center}.device,.recv,.hist{border:1px solid var(--bd);border-radius:12px;padding:.75rem;margin-top:.55rem}.dot{display:inline-block;width:.6rem;height:.6rem;border-radius:999px;background:var(--ok);margin-right:.45rem}.off{background:#98a2b3}.note{font-size:.82rem;color:var(--warn);margin-top:.3rem}.full{display:none;white-space:pre-wrap;word-break:break-word;margin-top:.4rem;padding:.6rem;border-radius:10px;background:var(--bg)}.full.show{display:block}.bar{height:8px;background:var(--bd);border-radius:999px;overflow:hidden;margin-top:.5rem}.fill{height:100%;background:var(--pri);width:0}.toastbox{position:fixed;left:50%;bottom:.8rem;transform:translateX(-50%);display:flex;flex-direction:column;gap:.5rem;z-index:50;width:min(92vw,420px)}.toast{background:var(--card);border:1px solid var(--bd);padding:.7rem .9rem;border-radius:12px}.banner{display:none;padding:.75rem;border:1px solid var(--warn);border-radius:12px;background:color-mix(in srgb,var(--warn) 10%,var(--card));margin-bottom:.85rem}.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{width:min(560px,100vw);background:var(--card);border:1px solid var(--bd);border-radius:18px 18px 0 0;padding:1rem}.count{font-size:.82rem}.chip{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.75rem;font-weight:700}.okc{color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,var(--card))}.erc{color:var(--err);background:color-mix(in srgb,var(--err) 12%,var(--card))}.inc{color:var(--warn);background:color-mix(in srgb,var(--warn) 12%,var(--card))}
</style></head><body>
<nav><b>LAN Drop</b><span id="dev" class="muted"></span><span class="sp"></span><button class="btn" onclick="tg()">EN</button><button class="btn" onclick="oset()">⚙</button><button class="btn" onclick="pullc()">📋</button></nav>
<div class="wrap">
<div id="ban" class="banner"></div>
<div class="grid">
<div class="card" style="text-align:center"><img src="/qr?size=180" alt="QR" style="max-width:180px;width:100%"><div class="hint">Scan to open this page on another device.</div></div>
<div class="card"><h3 data-i18n="rc">接收内容</h3><div id="rlist"></div><div id="rempty" class="muted" data-i18n="none">暂无内容</div></div>
<div class="card"><h3 data-i18n="sf">发送文件</h3><div class="drop" id="dz" onclick="fi.click()" ondragover="ev(event,1)" ondragleave="ev(event,0)" ondrop="dropf(event)"><div data-i18n="dh">拖拽文件到这里，或点击选择</div><div class="hint" data-i18n="mx">最大 2 GB</div></div><input id="fi" type="file" multiple hidden onchange="up(this.files)"><div id="prog" style="display:none"><div class="bar"><div id="fill" class="fill"></div></div><div class="hint"><span id="pct">0%</span></div></div><div id="sres" style="display:none"></div></div>
<div class="card"><h3 data-i18n="st">发送文本</h3><textarea id="txt" rows="5"></textarea><div class="row" style="margin-top:.5rem"><span id="cc" class="count muted">0 B</span><span class="sp"></span><button id="stb" class="btn pri" onclick="stx()" disabled data-i18n="send">发送</button></div><div id="tres" style="display:none"></div></div>
<div class="card"><h3 data-i18n="dv">局域网设备</h3><div id="dlist"></div><div class="row" style="margin-top:.6rem"><input id="ip" placeholder="192.168.1.10:53217"><button class="btn" onclick="con()" data-i18n="conn">连接</button></div></div>
<div class="card"><div class="row"><h3 style="margin:0" data-i18n="hist">历史记录</h3><span id="hcount" class="count muted">(0)</span><span class="sp"></span><button class="btn" onclick="fh()" data-i18n="reload">刷新</button></div><div class="row" style="margin:.5rem 0"><input id="hdate" type="date" onchange="rh()"><select id="hpeer" onchange="rh()"></select><button class="btn" onclick="rsf()" data-i18n="reset">重置</button><button class="btn err" onclick="ch()" data-i18n="clr">清空</button></div><div id="hlist"></div></div>
</div></div>
<div id="m" class="modal" onclick="if(event.target===this)cset()"><div class="sheet"><h3 data-i18n="set">设置</h3><div class="hint" data-i18n="dn">设备名称</div><input id="sname"><div class="row" style="margin-top:.8rem"><span class="sp"></span><button class="btn" onclick="cset()" data-i18n="cancel">取消</button><button class="btn pri" onclick="sset()" data-i18n="save">保存</button></div></div></div>
<div id="tb" class="toastbox"></div>
<script>
const I={zh:{sf:'Send File',st:'Send Text',dh:'Drop files here or click to choose',mx:'Max 2 GB',send:'Send',dv:'LAN Devices',rc:'Received',none:'No content yet',conn:'Connect',hist:'History',reload:'Reload',reset:'Reset',clr:'Clear',set:'Settings',dn:'Device Name',cancel:'Cancel',save:'Save',nf:'New file',nt:'New text',cb:'Clipboard synced',cbf:'Clipboard pull failed',nod:'No devices found. Connect manually if needed.',oned:'This server runs in one-time mode: new links expire after one successful read.',onen:'One-time item: the link expires after a successful read.',onec:'This is a one-time item. Continuing will consume the link. Continue?',copy:'Copy All',copied:'Copied',open:'Expand',close:'Collapse',down:'Download',hs0:'All Devices',hem:'No matching history records',ok:'Success',er:'Failed',it:'Interrupted',saved:'Saved',load:'Load failed'},en:{sf:'Send File',st:'Send Text',dh:'Drop files here or click to choose',mx:'Max 2 GB',send:'Send',dv:'LAN Devices',rc:'Received',none:'No content yet',conn:'Connect',hist:'History',reload:'Reload',reset:'Reset',clr:'Clear',set:'Settings',dn:'Device Name',cancel:'Cancel',save:'Save',nf:'New file',nt:'New text',cb:'Clipboard synced',cbf:'Clipboard pull failed',nod:'No devices found. Connect manually if needed.',oned:'This server runs in one-time mode: new links expire after one successful read.',onen:'One-time item: the link expires after a successful read.',onec:'This is a one-time item. Continuing will consume the link. Continue?',copy:'Copy All',copied:'Copied',open:'Expand',close:'Collapse',down:'Download',hs0:'All Devices',hem:'No matching history records',ok:'Success',er:'Failed',it:'Interrupted',saved:'Saved',load:'Load failed'}};
let L=(navigator.language||'').startsWith('zh')?'zh':'en',S={},D=[],R=[],H=[],C={},E=null,ID=Math.random().toString(36).slice(2);
const t=k=>(I[L]||I.en)[k]||k,$=id=>document.getElementById(id),esc=s=>{let d=document.createElement('div');d.textContent=s??'';return d.innerHTML},fs=b=>b>=1073741824?(b/1073741824).toFixed(1)+' GB':b>=1048576?(b/1048576).toFixed(1)+' MB':b>=1024?(b/1024).toFixed(1)+' KB':(b||0)+' B';
function tg(){L=L==='zh'?'en':'zh';ap()} function ap(){document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.dataset.i18n));$('txt').placeholder='Type text to send...';$('dev').textContent=S.name||'LAN Drop';$('sname').value=S.name||'LAN Drop';$('ban').style.display=S.one_time?'block':'none';$('ban').textContent=t('oned');$('dlist').innerHTML='';rd();rh();$('hpeer').innerHTML=`<option value="">${esc(t('hs0'))}</option>`+[...new Set(H.map(x=>x.peer).filter(Boolean))].sort().map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}
function toast(m){let e=document.createElement('div');e.className='toast';e.textContent=m;$('tb').appendChild(e);setTimeout(()=>e.remove(),2600)}
async function init(){ap();try{let r=await fetch('/info');S=await r.json();$('dev').textContent=S.name||'LAN Drop'}catch{}await fh();csse();fd();setInterval(fd,5000)}
async function cp(txt){if(navigator.clipboard&&window.isSecureContext)return navigator.clipboard.writeText(txt);let a=document.createElement('textarea');a.value=txt;a.style.position='fixed';a.style.opacity='0';document.body.appendChild(a);a.focus();a.select();try{document.execCommand('copy')}finally{a.remove()}}
async function pullc(){try{let r=await fetch('/clipboard');if(!r.ok)throw 0;let d=await r.json();if(d.content){await cp(d.content);toast(t('cb'))}}catch{toast(t('cbf'))}}
function csse(){if(E)E.close();E=new EventSource('/events');E.addEventListener('file_ready',e=>{let d=JSON.parse(e.data);if(d.sender===ID)return;R.unshift(d);rr();toast(d.type==='text'?t('nt'):`${t('nf')}: ${d.name||''}`)});E.addEventListener('device_found',e=>ad(JSON.parse(e.data)));E.addEventListener('device_lost',e=>ld(JSON.parse(e.data)));E.addEventListener('clipboard',e=>cp(JSON.parse(e.data).content).then(()=>toast(t('cb'))).catch(()=>toast(t('cbf'))));E.addEventListener('settings_updated',e=>{S.name=JSON.parse(e.data).device_name||S.name;ap()});E.addEventListener('done',()=>fh());E.onerror=()=>setTimeout(csse,3000)}
function ev(e,on){e.preventDefault();$('dz').style.borderColor=on?'var(--pri)':'var(--bd)'} function dropf(e){e.preventDefault();ev(e,0);if(e.dataTransfer.files.length)up(e.dataTransfer.files)}
async function up(files){if(!files||!files.length)return;let f=new FormData(),tot=0;for(const x of files){f.append('file',x);tot+=x.size}if(tot>2*1024*1024*1024)return toast(t('mx'));$('prog').style.display='block';$('sres').style.display='none';try{let x=new XMLHttpRequest();x.upload.onprogress=e=>{if(e.lengthComputable){let p=Math.round(e.loaded/e.total*100);$('fill').style.width=p+'%';$('pct').textContent=p+'%'}};let d=await new Promise((ok,bad)=>{x.onload=()=>{let j={};try{j=JSON.parse(x.responseText||'{}')}catch{};x.status>=200&&x.status<300?ok(j):bad(new Error(j.error||('HTTP '+x.status)))};x.onerror=()=>bad(new Error('upload failed'));x.open('POST','/send/file');x.setRequestHeader('X-Client-ID',ID);x.send(f)});let u=`${location.origin}/recv/${d.token}`;$('sres').style.display='block';$('sres').innerHTML=`<div class="recv"><div>${esc(files.length>1?files.length+' files':files[0].name)} (${fs(d.size)})</div><div class="hint" style="font-family:Consolas,monospace">${esc(u)}</div><div class="row" style="margin-top:.45rem"><button class="btn pri" onclick="bcopy('${esc(u)}',this)">${esc(t('copy'))}</button></div>${S.one_time?`<div class="note">${esc(t('onen'))}</div>`:''}</div>`}catch(e){toast(e.message)}$('prog').style.display='none';$('fill').style.width='0%'}
function bcopy(v,b){cp(v).then(()=>{let o=b.textContent;b.textContent=t('copied');setTimeout(()=>b.textContent=o,1200)}).catch(()=>toast(t('load')))}
$('txt').addEventListener('input',()=>{let n=new Blob([$('txt').value]).size;$('cc').textContent=fs(n);$('stb').disabled=!$('txt').value.trim()||n>10*1024*1024});
async function stx(){let c=$('txt').value;if(!c.trim())return;$('stb').disabled=true;try{let r=await fetch('/send/text',{method:'POST',headers:{'Content-Type':'application/json','X-Client-ID':ID},body:JSON.stringify({content:c})});let d=await r.json();if(!r.ok)throw new Error(d.error||'send failed');C[d.token]=c;let u=`${location.origin}/recv/${d.token}`;$('tres').style.display='block';$('tres').innerHTML=`<div class="recv"><div>${esc(t('saved'))} (${fs(d.length)})</div><div class="hint" style="font-family:Consolas,monospace">${esc(u)}</div><div class="row" style="margin-top:.45rem"><button class="btn pri" onclick="bcopy('${esc(u)}',this)">${esc(t('copy'))}</button></div>${S.one_time?`<div class="note">${esc(t('onen'))}</div>`:''}</div>`}catch(e){toast(e.message)}$('stb').disabled=!$('txt').value.trim()}
async function fd(){try{let r=await fetch('/devices');let d=await r.json();D=d.devices||[];rd()}catch{}}
function ad(d){let i=D.findIndex(x=>x.addr===d.addr);i>=0?D[i]={...D[i],...d,online:true}:D.push({...d,online:true});rd()}
function ld(d){let i=D.findIndex(x=>x.addr===d.addr);i>=0?D[i]={...D[i],...d,online:false}:D.push({...d,online:false});rd()}
function ago(ts){let s=Math.max(0,Math.floor(Date.now()/1000)-Number(ts||0));if(s<60)return'just now';if(s<3600)return`${Math.floor(s/60)}m ago`;if(s<86400)return`${Math.floor(s/3600)}h ago`;return`${Math.floor(s/86400)}d ago`}
function rd(){let e=$('dlist');if(!D.length){e.innerHTML=`<div class="muted">${esc(t('nod'))}</div>`;return}D.sort((a,b)=>Number(!!b.online)-Number(!!a.online)||Number(b.last_seen||0)-Number(a.last_seen||0));e.innerHTML=D.map(d=>`<div class="device" onclick="window.open('${/^https?:\/\//i.test(d.addr)?d.addr:location.protocol+'//'+d.addr}','_blank')"><div><span class="dot ${d.online?'':'off'}"></span><b>${esc(d.name||d.addr)}</b></div><div class="hint" style="font-family:Consolas,monospace">${esc(d.addr)}</div><div class="hint">${esc(d.online?'Online':'Last active '+ago(d.last_seen))}</div></div>`).join('')}
function con(){let v=$('ip').value.trim();if(v)window.open(/^https?:\/\//i.test(v)?v:location.protocol+'//'+v,'_blank')}
function cf(tok){let it=R.find(x=>x.token===tok);return !it||!it.one_time||C[tok]!==undefined||confirm(t('onec'))}
async function ptxt(tok){let r=await fetch('/preview/'+tok),d=await r.json();if(!r.ok)throw 0;return d.preview||''}
async function gtxt(tok){if(C[tok]!==undefined)return C[tok];let r=await fetch('/recv/'+tok),d=await r.json();if(!r.ok)throw new Error(d.error||'recv failed');C[tok]=d.content||'';return C[tok]}
function rr(){let e=$('rlist');$('rempty').style.display=R.length?'none':'block';e.innerHTML=R.map(it=>`<div class="recv"><div><b>${esc(it.type==='text'?'New Text':(it.name||'file'))}</b></div><div class="hint">${fs(it.size)}</div>${it.one_time?`<div class="note">${esc(t('onen'))}</div>`:''}${it.type==='text'?`<div id="p-${it.token}" class="hint"></div><div id="f-${it.token}" class="full"></div><div class="row" style="margin-top:.4rem"><button class="btn pri" onclick="cr('${it.token}',this)">${esc(t('copy'))}</button><button class="btn" id="tg-${it.token}" onclick="tr('${it.token}')">${esc(t('open'))}</button></div>`:`<div class="row" style="margin-top:.45rem"><a class="btn pri" href="/recv/${it.token}" download="${esc(it.name||'download')}" onclick="return cf('${it.token}')">${esc(t('down'))}</a></div>`}</div>`).join('');R.filter(x=>x.type==='text').forEach(async it=>{if(C[it.token]!==undefined){renderFull(it.token,C[it.token],0);return}try{$('p-'+it.token).textContent=await ptxt(it.token)}catch{}})}
function renderFull(tok,txt,open){$('p-'+tok).textContent=txt.slice(0,220);let f=$('f-'+tok),b=$('tg-'+tok);if(f){f.innerHTML=esc(txt).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');f.classList.toggle('show',!!open)}if(b)b.textContent=open?t('close'):t('open')}
async function cr(tok,b){if(!cf(tok))return;try{let txt=await gtxt(tok);await cp(txt);let o=b.textContent;b.textContent=t('copied');setTimeout(()=>b.textContent=o,1200)}catch{toast(t('load'))}}
async function tr(tok){if(!cf(tok))return;try{let f=$('f-'+tok),open=f.classList.contains('show');renderFull(tok,await gtxt(tok),!open)}catch{toast(t('load'))}}
async function fh(){try{let r=await fetch('/history');let d=await r.json();H=(d.history||[]).slice().reverse();$('hcount').textContent=`(${H.length})`;ap()}catch{}}
function hc(st){return st==='failed'?`<span class="chip erc">${esc(t('er'))}</span>`:st==='interrupted'?`<span class="chip inc">${esc(t('it'))}</span>`:`<span class="chip okc">${esc(t('ok'))}</span>`}
function rh(){let date=$('hdate').value,peer=$('hpeer').value,items=H.filter(x=>(!peer||x.peer===peer)&&(!date||new Date((x.timestamp||0)*1000).toISOString().slice(0,10)===date)),e=$('hlist');e.innerHTML=items.length?items.map(x=>`<div class="hist">${hc(x.status)} <b>${esc(x.name||x.type)}</b><div class="hint">${esc(new Date((x.timestamp||0)*1000).toLocaleString())} · ${fs(x.size)} · ${esc(x.peer||'-')}</div></div>`).join(''):`<div class="muted">${esc(t('hem'))}</div>`}
function rsf(){$('hdate').value='';$('hpeer').value='';rh()}
async function ch(){try{let r=await fetch('/history',{method:'DELETE'});if(!r.ok)throw 0;H=[];$('hcount').textContent='(0)';ap();rh();toast('History cleared')}catch{toast(t('load'))}}
function oset(){$('m').classList.add('show');$('sname').value=S.name||'LAN Drop'} function cset(){$('m').classList.remove('show')}
async function sset(){try{let r=await fetch('/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({device_name:$('sname').value.trim()})}),d=await r.json();if(!r.ok)throw 0;S.name=d.device_name||$('sname').value.trim();ap();cset();toast(t('saved'))}catch{toast(t('load'))}}
init();
</script></body></html>
